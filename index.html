<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NG SPORTS - Ropa Deportiva Femenina</title>
  <style>
    body {font-family: 'Helvetica Neue', sans-serif;margin: 0;background-color: #fdfaf6;color: #3f2e1d;}
    header {background-color: #e9e2d0;padding: 20px;text-align: center;position: relative;}
    header h1 {margin: 0;font-size: 2.5rem;letter-spacing: 2px;}
    nav {margin-top: 10px;}
    nav a {margin: 0 15px;text-decoration: none;color: #3f2e1d;font-weight: bold;}
    .cart-icon {position: absolute;top: 20px;right: 20px;cursor: pointer;}
    .cart-count {background: #3f2e1d;color: white;padding: 2px 6px;border-radius: 50%;font-size: 0.8rem;vertical-align: super;}
    .productos {display: grid;grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));gap: 20px;padding: 40px;}
    .producto {background-color: #fff;border-radius: 12px;box-shadow: 0 2px 8px rgba(0,0,0,0.1);text-align: center;padding: 20px;}
    .producto img {width: 100%;border-radius: 10px;}
    .producto button {background-color: #c4b49d;color: white;padding: 10px;border: none;border-radius: 6px;cursor: pointer;}
    #cart {display: none;position: fixed;top: 80px;right: 20px;width: 300px;background: white;box-shadow: 0 0 10px rgba(0,0,0,0.2);border-radius: 10px;padding: 20px;}
    .cart-item {display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .cart-item button {border:none;background:none;font-weight:bold;cursor:pointer;}
    #checkout {width:100%;padding:10px;margin-top:10px;background:#25D366;color:white;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
  </style>
</head>
<body>

<header>
  <h1>NG SPORTS</h1>
  <div class="cart-icon" onclick="toggleCart()">🛒 <span id="cart-count">0</span></div>
</header>

<div id="cart">
  <h3>Carrito</h3>
  <div id="cart-items"></div>
  <p>Total: $<span id="cart-total">0</span> MXN</p>
  <button id="checkout">Pedir por WhatsApp</button>
</div>

<section class="productos">
  <div class="producto">
    <img src="https://img.ltwebstatic.com/v4/j/spmp/2025/05/21/3d/1747822269c4b25edbea2826b754162b3325324c47.webp">
    <h3>Short Rosa</h3>
    <p>$380</p>
    <button onclick="addToCart('Short Rosa',380)">Agregar</button>
  </div>
  <div class="producto">
    <img src="https://img.ltwebstatic.com/v4/j/spmp/2025/05/21/6d/174782227106be35070347a0b87bee3327e4c5de1c.webp">
    <h3>Short Burdeos</h3>
    <p>$380</p>
    <button onclick="addToCart('Short Burdeos',380)">Agregar</button>
  </div>
</section>

<script>
let cart = [];

function addToCart(name, price){
  let item = cart.find(p=>p.name===name);
  if(item){item.qty++;}else{cart.push({name,price,qty:1});}
  updateCart();
}

function updateCart(){
  let items=document.getElementById('cart-items');
  let total=0, count=0;
  items.innerHTML='';

  cart.forEach(p=>{
    total+=p.price*p.qty;
    count+=p.qty;
    items.innerHTML+=`<div class='cart-item'>
      ${p.name} x${p.qty}
      <div>
        <button onclick="p.qty++;updateCart()">+</button>
        <button onclick="p.qty--; if(p.qty<=0) cart=cart.filter(i=>i.name!==p.name); updateCart()">-</button>
      </div>
    </div>`;
  });

  document.getElementById('cart-total').innerText=total;
  document.getElementById('cart-count').innerText=count;
}

function toggleCart(){
  let c=document.getElementById('cart');
  c.style.display=c.style.display==='block'?'none':'block';
}

// 🔥 WHATSAPP AUTOMÁTICO CON CARRITO

document.getElementById('checkout').addEventListener('click', ()=>{
  if(cart.length===0){alert('Tu carrito está vacío');return;}

  let mensaje='Hola, quiero hacer este pedido:%0A';
  let total=0;

  cart.forEach(p=>{
    mensaje+=`- ${p.name} x${p.qty} = $${p.price*p.qty} MXN%0A`;
    total+=p.price*p.qty;
  });

  mensaje+=`Total: $${total} MXN`;

  let numero='5218123380548'; // 👈 CAMBIA TU NUMERO

  let url=`https://wa.me/${numero}?text=${mensaje}`;

  window.open(url,'_blank');
});
</script>

</body>
</html>
</html>
